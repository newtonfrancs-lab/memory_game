<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Decryptor | Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html">01_ROOT</a>
        <a href="memory_game.html">02_BREACH</a>
        <a href="leaderboard.html">03_RANK</a>
        <a href="about.html">04_LOGS</a>
    </nav>

    <div class="glass fade" style="margin-top: 50px; width: 80%;">
        <h2 style="margin-bottom: 20px;">GLOBAL_REGISTRY</h2>
        <div id="board"></div>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem("memoryData")) || [];
        data.sort((a, b) => b.score - a.score);
        let html = `<table style="width:100%; border-collapse:collapse;">
            <tr style="border-bottom: 1px solid var(--primary); color:var(--secondary);">
                <th>RANK</th><th>ID</th><th>SCORE</th><th>TIME</th>
            </tr>`;
        data.forEach((d, i) => {
            html += `<tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                <td style="padding:10px;">#0${i+1}</td>
                <td>${d.player}</td>
                <td>${d.score}</td>
                <td>${d.time}s</td>
            </tr>`;
        });
        document.getElementById("board").innerHTML = html + "</table>";
    </script>
</body>
</html>
