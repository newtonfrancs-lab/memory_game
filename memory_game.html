<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Decryptor | Breach</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <a href="index.html">01_ROOT</a>
    <a href="memory_game.html">02_BREACH</a>
    <a href="leaderboard.html">03_RANK</a>
    <a href="about.html">04_LOGS</a>
</nav>

<div class="container fade">

    <h2>MEMORY_BREACH</h2>

    <div id="game-board"></div>

    <button class="btn" onclick="startGame()">RESTART</button>

</div>

<script>
const symbols = ["💀","👁","⚡","🧠","💻","🔐","📡","🧬"];
let cards = [...symbols, ...symbols];
let flipped = [];
let matched = [];

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function startGame(){
    const board = document.getElementById("game-board");
    board.innerHTML = "";
    shuffle(cards);
    flipped = [];
    matched = [];

    cards.forEach((symbol,index)=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">?</div>
                <div class="card-back">${symbol}</div>
            </div>
        `;

        card.onclick = () => flipCard(card,index);
        board.appendChild(card);
    });
}

function flipCard(card,index){
    if(flipped.length<2 && !card.classList.contains("flipped")){
        card.classList.add("flipped");
        flipped.push({card,index});

        if(flipped.length===2){
            if(cards[flipped[0].index]===cards[flipped[1].index]){
                flipped = [];
            } else {
                setTimeout(()=>{
                    flipped.forEach(f=>f.card.classList.remove("flipped"));
                    flipped = [];
                },600);
            }
        }
    }
}

startGame();
</script>

</body>
</html>
